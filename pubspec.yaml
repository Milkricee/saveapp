name: saveapp
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  image: ^4.2.0
  photo_view: ^0.15.0
  local_auth: ^2.1.3
  encrypt: ^5.0.3
  url_launcher: ^6.0.20
  fluttertoast: ^8.0.8

dev_dependencies:  
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/cat_1.png
    - assets/cat_2.png
    - assets/cat_3.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/save_logo.png"
  remove_alpha_ios: true
